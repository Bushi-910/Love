<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Për Sonin ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Sfond më i errët që të duken zemrat */
            background: #8e0e2f; 
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #ff4d6d;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 85%;
            color: white;
        }

        h1 { font-size: 3rem; margin-bottom: 20px; color: #ff4d6d; text-shadow: 2px 2px 10px black; }
        
        /* Teksti kryesor - Super i qartë */
        p { 
            font-size: 2rem; 
            line-height: 1.4; 
            font-weight: bold; 
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        .names-tag {
            font-size: 2.2rem;
            margin-top: 20px;
            background: #ff4d6d;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        /* Krijimi i formës së zemrës */
        .heart {
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: #ff4d6d;
            transform: rotate(-45deg);
            animation: moveUp 8s linear forwards;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: #ff4d6d;
            border-radius: 50%;
        }

        .heart::before { top: -60px; left: 0; }
        .heart::after { left: 60px; top: 0; }

        /* Teksti brenda zemrës */
        .heart-text {
            transform: rotate(45deg); /* Kthejmë tekstin drejt */
            color: white;
            font-weight: bold;
            font-size: 20px;
            z-index: 10;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes moveUp {
            0% { transform: translateY(110vh) rotate(-45deg) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(-45deg) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Për Princeshën Time ❤️</h1>
        <p>
            Jetta ime te dua shum, je goca me e bukur ne bote jo vetem fizikisht po dhe shpirterisht, e ndjej veten shum me fat qe te kam.
        </p>
        <div class="names-tag">Bushi ❤️ Soni</div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            
            const textSpan = document.createElement('span');
            textSpan.className = 'heart-text';
            
            const content = ['Bushi', 'Soni', 'Love', '💍', '💎', 'Forever'];
            textSpan.innerText = content[Math.floor(Math.random() * content.length)];
            
            heart.appendChild(textSpan);
            heart.style.left = Math.random() * 90 + 'vw';
            heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
            
            // Ndryshojmë pak ngjyrën e zemrave që të mos jenë fiks njësoj
            const colors = ['#ff4d6d', '#ff758f', '#c9184a', '#ff0054'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            heart.style.backgroundColor = randomColor;
            heart.style.setProperty('--bg-color', randomColor); 
            
            // Duhet t'i japim ngjyrën edhe rrathëve të zemrës
            const style = document.createElement('style');
            style.innerHTML = `.heart:nth-child(even)::before, .heart:nth-child(even)::after { background-color: ${randomColor}; }`;
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }

        setInterval(createHeart, 600);
    </script>
</body>
</html>
