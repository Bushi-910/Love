<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Për Soni ❤️</title>
    <style>
        /* Sfondi me gradient më të fortë romantik */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fcb69f 100%);
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        /* Kutia kryesore me kornizë dhe shkëlqim (glow) */
        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4); /* Efekt xhami */
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 40px;
            border: 4px solid #fff;
            box-shadow: 0 15px 50px rgba(255, 77, 109, 0.6);
            max-width: 80%;
            width: 1000px;
            color: #222; /* Shkrim i zi për qartësi */
        }

        /* Titulli kryesor i madh dhe me 'glow' */
        h1 { 
            color: #d80032; /* E kuqe e fortë */
            font-size: 3.8rem; 
            margin-bottom: 25px;
            margin-top: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            animation: pulse 2s infinite;
            font-weight: 800;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Teksti kryesor (mesazhi): Shkrim super i madh dhe i qartë */
        p { 
            color: #222; 
            font-size: 2.3rem; 
            line-height: 1.4; 
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: none;
        }

        /* Kutia e emrave poshtë */
        .names-tag {
            font-size: 2.5rem;
            display: inline-block;
            background: rgba(255, 255, 255, 1);
            color: #d80032;
            padding: 15px 35px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            font-weight: 900;
            border: 2px solid #d80032;
        }

        /* Elementi i zemrave që fluturojnë */
        .floating-heart {
            position: absolute;
            width: 150px; /* Madhësia e unazës së jashtme të zemrës */
            height: 150px;
            background: rgba(216, 0, 50, 0.8); /* E kuqe e fortë */
            border-radius: 50%; /* Bëhet rreth */
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 0 15px rgba(216, 0, 50, 0.5); /* Shkëlqim */
            animation: floatUp ease forwards;
        }
