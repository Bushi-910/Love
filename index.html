<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propozimi Special ❤️</title>
    <style>
        /* Sfond me gradient të lëmuar (smooth) dhe animacion */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #a71d31, #e63946, #40030e, #a71d31);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            color: white;
            touch-action: manipulation;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Kutia kryesore me efekt qelqi (Glassmorphism) */
        #main-card {
            text-align: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 25px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
            width: 80%;
            max-width: 400px;
            transform: scale(0.9);
            animation: cardPopIn 1s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardPopIn {
            to { transform: scale(1); opacity: 1; }
        }

        h1 { 
            font-size: 1.9rem; 
            margin-bottom: 30px; 
            margin-top: 0;
            line-height: 1.3;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3); 
            font-weight: 700;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Butonat moderne me shkëlqim dhe hije (3D effect) */
        button {
            padding: 18px 0;
            width: 100%;
            font-size: 1.6rem;
            font-weight: 800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        /* Butoni PO (Glow Effect) */
        #yesBtn { 
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white; 
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.5); 
        }
        #yesBtn:active { transform: scale(0.95); box-shadow: 0 4px 15px rgba(40, 167, 69, 0.5); }

        /* Butoni JO */
        #noBtn { 
            background: linear-gradient(135deg, #f25f75, #dc3545);
            color: white; 
            position: relative; 
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
        }

        /* Faqja e rezultatit (Final Screen) */
        #result {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #result.active { opacity: 1; display: flex; }

        #result h2 { 
            font-size: 2.8rem; 
            color: #ff4d6d; 
            margin-bottom: 15px; 
            text-shadow: 0 0 15px rgba(255,77,109,0.7); 
            font-weight: 900;
        }
        
        #result p { font-size: 1.7rem; font-weight: 500; color: #eee; margin: 5px 0 30px; }

        #finalBtn {
            background: rgba(255,255,255,0.2);
            color: #aaa;
            font-size: 1rem;
            width: 50%;
            margin-top: 30px;
            backdrop-filter: blur(5px);
        }

        /* Zemrat reale me formë të pastër */
        .heart {
            position: absolute;
            width: 70px; height: 70px;
            background-color: #ff4d6d;
            transform: rotate(-45deg);
            animation: moveUp 6s linear forwards;
            filter: drop-shadow(0 0 8px rgba(255,77,109,0.6));
            z-index: 1;
        }
        .heart::before, .heart::after {
            content: ""; position: absolute;
            width: 70px; height: 70px;
            background-color: #ff4d6d; border-radius: 50%;
        }
        .heart::before { top: -35px; left: 0; }
        .heart::after { left: 35px; top: 0; }

        @keyframes moveUp {
            0% { transform: translateY(110vh) rotate(-45deg) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-30vh) rotate(-45deg) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="main-card">
        <h1>Jetta ime, do martohesh me mua? 💍</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="celebrate()">PO ❤️</button>
            <button id="noBtn" onclick="sadMode()" onmouseover="moveNo()" ontouchstart="moveNo()">JO</button>
        </div>
    </div>

    <div id="result">
        <h2 id="finalText"></h2>
        <p id="finalSubtext"></p>
        <div id="emojiDisplay" style="font-size: 7rem;"></div>
        <button id="finalBtn" onclick="location.reload()">Kthehu</button>
    </div>

    <script>
        // Funksioni që lëviz butonin JO
        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.zIndex = "150"; // Bëhet përmbi gjithçka kur lëviz
        }

        function showResult() {
            document.getElementById('result').classList.add('active');
        }

        function sadMode() {
            showResult();
            document.getElementById('finalText').innerText = "Pse zemër? 😭";
            document.getElementById('finalSubtext').innerText = "Më thyeve zemrën...";
            document.getElementById('emojiDisplay').innerText = "💔🥀";
        }

        function celebrate() {
            showResult();
            document.getElementById('finalText').innerText = "TE DUA PA FUND! ❤️";
            document.getElementById('finalSubtext').innerText = "Bushi ❤️ Soni";
            document.getElementById('emojiDisplay').innerText = "💍🎆✨💖";
            
            // Shpërthe shumë zemra
            setInterval(createHeart, 250);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * 85 + 'vw';
            heart.style.backgroundColor = ['#ff4d6d', '#ff0054', '#ff758f'][Math.floor(Math.random()*3)];
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
    </script>
</body>
</html>
