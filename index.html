<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propozimi Special ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #5e0b1f; /* Ngjyrë vishnje e errët */
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        #main-card {
            text-align: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 40px;
            border: 3px solid #ff4d6d;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            max-width: 90%;
        }

        h1 { font-size: 3rem; margin-bottom: 30px; text-shadow: 2px 2px 10px black; }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        #yesBtn { background: #28a745; color: white; box-shadow: 0 0 20px #28a745; }
        #noBtn { background: #dc3545; color: white; position: relative; }

        /* Mesazhi final */
        #result {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #result h2 { font-size: 5rem; color: #ff4d6d; animation: grow 1s infinite alternate; }
        
        @keyframes grow {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Zemrat që fluturojnë (si më parë) */
        .heart {
            position: absolute;
            width: 100px; height: 100px;
            background-color: #ff4d6d;
            transform: rotate(-45deg);
            animation: moveUp 6s linear forwards;
            opacity: 0.8;
        }
        .heart::before, .heart::after {
            content: ""; position: absolute;
            width: 100px; height: 100px;
            background-color: #ff4d6d; border-radius: 50%;
        }
        .heart::before { top: -50px; left: 0; }
        .heart::after { left: 50px; top: 0; }

        @keyframes moveUp {
            0% { transform: translateY(110vh) rotate(-45deg) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(-45deg) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="main-card">
        <h1>Jetta ime, do martohesh me mua? 💍</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="celebrate()">PO ❤️</button>
            <button id="noBtn" onclick="sadMode()" onmouseover="moveNo()">JO</button>
        </div>
    </div>

    <div id="result">
        <h2 id="finalText"></h2>
        <p style="font-size: 2rem;" id="finalSubtext"></p>
        <div id="emojiDisplay" style="font-size: 8rem;"></div>
        <button onclick="location.reload()" style="margin-top: 20px; font-size: 1rem;">Kthehu mbrapa</button>
    </div>

    <script>
        // Funksioni kur shtyp JO (butoni lëviz që të mos e kapë dot kollaj)
        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // Kur detyrohet dhe e shtyp JO
        function sadMode() {
            document.getElementById('result').style.display = 'flex';
            document.getElementById('finalText').innerText = "Pse zemër? 😭";
            document.getElementById('finalSubtext').innerText = "Më thyeve zemrën...";
            document.getElementById('emojiDisplay').innerText = "💔😭🥀";
            document.getElementById('finalText').style.color = "white";
        }

        // Kur shtyp PO
        function celebrate() {
            document.getElementById('result').style.display = 'flex';
            document.getElementById('finalText').innerText = "TE DUA PA FUND! ❤️";
            document.getElementById('finalSubtext').innerText = "Bushi ❤️ Soni Përgjithmonë";
            document.getElementById('emojiDisplay').innerText = "💍✨🎆💖";
            
            // Shto shumë zemra
            setInterval(createHeart, 200);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.backgroundColor = ['#ff4d6d', '#ff0054', '#ff758f'][Math.floor(Math.random()*3)];
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
    </script>
</body>
</html>
